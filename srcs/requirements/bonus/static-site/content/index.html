<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inception Project</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        .services {
            display: flex;
            justify-content: space-around;
            margin-top: 40px;
        }
        .service {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            width: 150px;
        }
        .service h3 {
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inception</h1>
        <p>A complete web infrastructure using Docker</p>
        <p>Created by cprot as part of the 42 curriculum</p>
        
        <div class="services">
            <div class="service">
                <h3>NGINX</h3>
                <p>Web Server<br>HTTPS Only</p>
            </div>
            <div class="service">
                <h3>WordPress</h3>
                <p>Content Management System</p>
            </div>
            <div class="service">
                <h3>MariaDB</h3>
                <p>Database Server</p>
            </div>
        </div>
    </div>
</body>
</html>
